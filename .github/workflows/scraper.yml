name: KhelPediA Scraper Sync

on:
  schedule:
    # Runs every 15 minutes (staggered to respect rate limits)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions dashboard

jobs:
  sync:
    name: Fetch and Sync All Game Data
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'scraper-engine/requirements.txt'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scraper-engine/requirements.txt

    - name: Notify Sync Started
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      if: env.DISCORD_WEBHOOK_URL != ''
      run: |
        curl -H "Content-Type: application/json" \
             -X POST \
             -d '{"embeds": [{"title": "🚀 KhelPediA Sync Started", "description": "Scraper cron job started — syncing Valorant, PUBG, BGMI data from VLR.gg, Liquipedia, and PandaScore.", "color": 16738133}]}' \
             $DISCORD_WEBHOOK_URL

    - name: Execute Scrapers
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        PANDASCORE_API_KEY: ${{ secrets.PANDASCORE_API_KEY }}
        PYTHONIOENCODING: "utf-8"
      run: |
        echo "=== Running Valorant Live Matches Sync ==="
        python scraper-engine/vlr_scraper.py
        
        echo "=== Running Valorant Tournaments & Events Sync ==="
        python scraper-engine/vlr_tournament_scraper.py
        
        echo "=== Running PandaScore Match Sync ==="
        python scraper-engine/pandascore_engine.py
        
        echo "=== Running Liquipedia Sync (BGMI, PUBG Mobile, PUBG PC) ==="
        python scraper-engine/liquipedia_scraper.py

    - name: Notify Sync Success
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      if: success() && env.DISCORD_WEBHOOK_URL != ''
      run: |
        curl -H "Content-Type: application/json" \
             -X POST \
             -d '{"embeds": [{"title": "✅ KhelPediA Sync Completed", "description": "Valorant + PUBG + BGMI — all matches and tournaments synced to Supabase.", "color": 3066993}]}' \
             $DISCORD_WEBHOOK_URL

    - name: Notify Sync Failure
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      if: failure() && env.DISCORD_WEBHOOK_URL != ''
      run: |
        curl -H "Content-Type: application/json" \
             -X POST \
             -d '{"embeds": [{"title": "❌ KhelPediA Sync Failed", "description": "An error occurred during execution. Please check the logs in GitHub Actions.", "color": 15158332}]}' \
             $DISCORD_WEBHOOK_URL
